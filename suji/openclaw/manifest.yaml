slug: openclaw
tier: suji
name: OpenClaw
description: Multi-channel messaging bot with AI-powered responses (Telegram, Discord, WhatsApp, Slack).
homepage_url: https://github.com/Arizona-dev/openclaw
icon_url: https://raw.githubusercontent.com/Arizona-dev/suji-app-templates/main/suji/openclaw/icon.svg
version: 1.0.0
release_notes: First marketplace release.
categories: [communication, automation]
license: MIT

resources:
  min_memory_mib: 512
  recommended_memory_mib: 1024
  min_cpu_millicores: 250
  recommended_storage_gib: 5

exposure:
  exposable: true
  default: on
  port: 18789
  subdomain_hint: openclaw

network:
  internal_hostname: openclaw

upgrade_policy: automatic

registry:
  - ghcr.io

form_schema:
  - key: AI_PROVIDER
    type: select
    label: AI provider
    description: Which AI service OpenClaw uses for replies.
    required: true
    options:
      - { value: anthropic, label: Anthropic (Claude) }
      - { value: openai, label: OpenAI (GPT) }

  - key: AI_API_KEY
    type: secret
    label: AI API key
    description: Your API key for the chosen provider.
    required: true

  - key: OPENCLAW_GATEWAY_PASSWORD
    type: secret
    label: Gateway password
    description: Auto-generated if blank — used to authenticate the bot's webhook callbacks.
    auto_generate: true

  - key: CHANNELS
    type: multiselect
    label: Channels
    description: Messaging platforms OpenClaw connects to.
    required: true
    options:
      - { value: telegram, label: Telegram }
      - { value: discord, label: Discord }
      - { value: whatsapp, label: WhatsApp Cloud API }
      - { value: slack, label: Slack }

  - key: TELEGRAM_BOT_TOKEN
    type: secret
    label: Telegram bot token
    description: From @BotFather. Required if Telegram is selected.

  - key: DISCORD_BOT_TOKEN
    type: secret
    label: Discord bot token
    description: From the Discord developer portal. Required if Discord is selected.

  - key: WHATSAPP_TOKEN
    type: secret
    label: WhatsApp Cloud API token
    description: From Meta Business. Required if WhatsApp is selected.

  - key: SLACK_BOT_TOKEN
    type: secret
    label: Slack bot token
    description: From Slack app config. Required if Slack is selected.

compose: |
  services:
    openclaw:
      image: ghcr.io/arizona-dev/openclaw:1.0.0
      restart: unless-stopped
      environment:
        AI_PROVIDER: ${AI_PROVIDER}
        AI_API_KEY: ${AI_API_KEY}
        OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD}
        CHANNELS: ${CHANNELS}
        TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
        DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
        WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
        SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      ports:
        - "18789"
      volumes:
        - openclaw-data:/data
      networks: [suji-net]
      deploy:
        resources:
          limits:
            memory: 1024M
            cpus: "1.0"
  volumes:
    openclaw-data:
  networks:
    suji-net:
      external: true
